{% extends "base.html" %}
{% block content %}
<section class="chat-shell {% if completion %}has-completion{% else %}is-empty{% endif %}">
    <div class="intro">
        <h1>Where should we begin?</h1>
    </div>

    {% if completion %}
        <section class="conversation" aria-live="polite">
            <article class="message user-message">
                <div class="message-label">Start of phrase</div>
                <p>{{ form.prompt }}</p>
            </article>
            <article class="message model-message">
                <div class="message-label">Completed phrase</div>
                <p>{{ completion }}</p>
            </article>
        </section>
    {% endif %}

    <form class="composer" method="post" data-completion-form>
        <label class="sr-only" for="prompt">Start of phrase</label>
        <div class="input-bar">
            <textarea
                id="prompt"
                name="prompt"
                rows="2"
                placeholder="Add the start of a phrase..."
                autofocus
            >{{ form.prompt }}</textarea>
            <button class="primary-button" type="submit" aria-label="Complete phrase">
                <span class="button-label">Complete</span>
                <span class="spinner" aria-hidden="true"></span>
            </button>
        </div>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </form>
</section>
<script>
    const completionForm = document.querySelector("[data-completion-form]");
    if (completionForm) {
        completionForm.addEventListener("submit", () => {
            completionForm.classList.add("is-submitting");
            completionForm.querySelector("button[type='submit']").disabled = true;
        });
    }
</script>
{% endblock %}
