{% extends "base.html" %}
{% block content %}
<section class="workspace">
    <form class="composer" method="post" data-completion-form>
        <div class="field">
            <label for="prompt">Start of phrase</label>
            <textarea id="prompt" name="prompt" rows="8" autofocus>{{ form.prompt }}</textarea>
        </div>

        <button class="primary-button" type="submit">
            <span class="button-label">Complete</span>
            <span class="spinner" aria-hidden="true"></span>
        </button>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </form>

    <section class="result-panel" aria-live="polite">
        <div class="result-header">
            <h1>End of phrase</h1>
            <span>{{ weights_path }}</span>
        </div>
        {% if completion %}
            <pre class="completion">{{ completion }}</pre>
        {% else %}
            <div class="empty-state">
                <span class="empty-mark"></span>
            </div>
        {% endif %}
    </section>
</section>
<script>
    const completionForm = document.querySelector("[data-completion-form]");
    if (completionForm) {
        completionForm.addEventListener("submit", () => {
            completionForm.classList.add("is-submitting");
            completionForm.querySelector("button[type='submit']").disabled = true;
        });
    }
</script>
{% endblock %}
