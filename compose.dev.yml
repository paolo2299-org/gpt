services:
  gpt:
    build:
      context: .
    command: flask --app app run --debug --no-reload --host=0.0.0.0 --port=8080
    environment:
      FLASK_ENV: development
      MODEL_DEVICE: auto
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - type: bind
        source: ./models
        target: /models
        read_only: true
        bind:
          create_host_path: false

  test:
    build:
      context: .
    command: python -m pytest tests/ -v
    environment:
      FLASK_ENV: development
    volumes:
      - .:/app
